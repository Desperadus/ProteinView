name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
  workflow_dispatch:

jobs:
  check-version:
    name: Check if version needs publishing
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml and check PyPI
        id: check
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/proteinview/$VERSION/json")
          if [ "$HTTP_STATUS" = "404" ]; then
            echo "Version $VERSION not found on PyPI — will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION already published on PyPI — skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  build-linux-wheels:
    name: Build Linux wheels (${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64
            runner: ubuntu-24.04
          - target: aarch64
            runner: ubuntu-24.04-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  publish:
    name: Publish to PyPI
    needs: [check-version, build-linux-wheels]
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-linux-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
